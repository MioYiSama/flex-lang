name: build.yml
on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - uses: lukka/get-cmake@latest

      - name: Build
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build

      - uses: actions/upload-artifact@v4
        with:
          name: 'artifact'
          path: build/flex*